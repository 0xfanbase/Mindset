name: daily-cards
on:
  schedule:
    - cron: "56 21 * * *"   # 21:56 UTC = 05:56 HKT next day — a few minutes before the
                            # 06:00 HKT target and off the top-of-hour scheduler-congestion
                            # slot GitHub Actions cron is most likely to delay
  workflow_dispatch: {}
permissions:
  contents: write
  actions: write
concurrency:
  group: daily
  cancel-in-progress: true
jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/generate-daily.mjs
      - name: commit if changed
        id: commit
        run: |
          git config user.name "mindset-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/daily.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "[bot] daily cards $(TZ=Asia/Hong_Kong date +%F)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: trigger Pages redeploy
        # A push authored with the default GITHUB_TOKEN does not itself fire other
        # workflows' `on: push` triggers (GitHub's own loop-prevention) -- without this,
        # pages-deploy.yml would silently never redeploy the bot's daily commit, and the
        # live site would never actually pick up the new daily.json. Dispatch it directly.
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages-deploy.yml --ref main
