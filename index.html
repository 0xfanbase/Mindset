<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>Mindset</title>
<meta name="description" content="Three grounding cards, every morning at 05:00 HKT.">
<meta property="og:title" content="Mindset">
<meta property="og:description" content="Three grounding cards, every morning at 05:00 HKT.">
<meta property="og:type" content="website">
<link rel="icon" href="./assets/favicon.svg" type="image/svg+xml">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FAF9F5">
<script>
(function () {
  try {
    var t = localStorage.getItem("mindset.theme");
    if (t === "calm" || t === "blossom") document.documentElement.setAttribute("data-theme", t);
  } catch (e) {}
})();
</script>
<link rel="stylesheet" href="./styles.css">
</head>
<body>
<header>
  <div class="brand">
    <div class="wordmark">mindset</div>
    <div id="date-line" class="date-line"></div>
  </div>
  <div class="figure-wrap">
    <mindset-figure id="figure" aria-hidden="true"></mindset-figure>
  </div>
  <button id="theme-toggle" class="theme-toggle" aria-pressed="false" aria-label="Switch theme" title="Switch theme">&#9680;</button>
</header>
<main>
  <div id="staleness-chip" class="chip" hidden></div>
  <nav class="tabs" role="tablist" aria-label="Sections">
    <button type="button" role="tab" id="tab-today" aria-selected="true" aria-controls="panel-today" class="tab">Today</button>
    <button type="button" role="tab" id="tab-values" aria-selected="false" aria-controls="panel-values" class="tab">Values</button>
    <button type="button" role="tab" id="tab-weeks" aria-selected="false" aria-controls="panel-weeks" class="tab">Weeks</button>
    <button type="button" role="tab" id="tab-mara" aria-selected="false" aria-controls="panel-mara" class="tab">Mara</button>
  </nav>
  <div role="tabpanel" id="panel-today" aria-labelledby="tab-today" class="panel">
    <div id="cards"></div>
  </div>
  <div role="tabpanel" id="panel-values" aria-labelledby="tab-values" class="panel" hidden>
    <div id="values-list"></div>
  </div>
  <div role="tabpanel" id="panel-weeks" aria-labelledby="tab-weeks" class="panel" hidden>
    <div id="weeks-root"></div>
  </div>
  <div role="tabpanel" id="panel-mara" aria-labelledby="tab-mara" class="panel" hidden>
    <div id="mara-root"></div>
  </div>
</main>
<footer>
  <div>refreshes daily &middot; 05:00 HKT</div>
</footer>
<script type="module" src="./figure.js"></script>
<script type="module" src="./app.js"></script>
</body>
</html>
